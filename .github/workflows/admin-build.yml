name: Admin Android Build (Test)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Copy Gradle Wrapper
        run: |
          cp -r android-app/gradle android-admin-app/
          cp android-app/gradlew android-admin-app/
          chmod +x android-admin-app/gradlew

      - name: Generate temporary keystore
        run: |
          keytool -genkeypair -v \
            -keystore temp.jks \
            -alias temp-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 100 \
            -storepass temp-password \
            -keypass temp-password \
            -dname "CN=WorkDaily-Admin, OU=Dev, O=WorkDaily, L=City, S=State, C=US"

      - name: Build Admin Release APK
        run: |
          cd android-admin-app
          ./gradlew assembleAdminRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/temp.jks \
            -Pandroid.injected.signing.store.password=temp-password \
            -Pandroid.injected.signing.key.alias=temp-key \
            -Pandroid.injected.signing.key.password=temp-password

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-release-apk
          path: android-admin-app/app/build/outputs/apk/admin/release/app-admin-release.apk
