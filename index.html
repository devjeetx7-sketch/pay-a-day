<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script>
      // Ensure dark mode persists accurately without fighting frameworks
      const theme = localStorage.getItem('theme');
      if (theme === 'light') {
        document.documentElement.classList.remove('dark');
      } else if (theme === 'dark' || !theme) {
        document.documentElement.classList.add('dark');
        if (!theme) localStorage.setItem('theme', 'dark');
      }
    </script>
    <title>DailyWork</title>
    <meta name="description" content="DailyWork - Track your work days and earnings effortlessly. Made by Dharmjeet." />
    <meta name="author" content="Dharmjeet" />

    <meta property="og:title" content="DailyWork - Contractor & Personal Tracker" />
    <meta property="og:description" content="Manage workers, attendance, and earnings in a seamless dual-mode application." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Dharmjeet" />
  </head>

  </body>
